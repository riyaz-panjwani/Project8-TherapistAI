<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Space — TherapistAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<!-- ── Name prompt overlay (first visit only) ──────────────────────────── -->
<div id="name-overlay" class="overlay hidden">
  <div class="overlay-card">
    <h2>Before we begin</h2>
    <p>What would you like me to call you? (Optional)</p>
    <input id="name-input" type="text" placeholder="Your name or nickname" maxlength="64" autocomplete="off" />
    <button id="name-submit">Begin</button>
  </div>
</div>

<!-- ── Main layout ─────────────────────────────────────────────────────── -->
<div class="app">

  <!-- Left sidebar: session memory panel -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Your Space</span>
      <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle sidebar">◀</button>
    </div>

    <div class="memory-panel">
      <h3>What I remember</h3>
      <div class="memory-block">
        <label>Mood right now</label>
        <div id="mood-badge" class="badge neutral">neutral</div>
      </div>
      <div class="memory-block">
        <label>Topics we've touched</label>
        <ul id="topics-list"><li class="empty">Nothing yet</li></ul>
      </div>
      <div class="memory-block">
        <label>People you've mentioned</label>
        <ul id="people-list"><li class="empty">No one yet</li></ul>
      </div>
    </div>

    <!-- Debug panel (intent) -->
    <details class="debug-panel">
      <summary>Intent radar</summary>
      <div id="intent-display">
        <span class="intent-label" id="intent-label">—</span>
        <span class="intent-score" id="intent-score"></span>
        <div id="intent-state-dump"></div>
      </div>
    </details>
  </aside>

  <!-- Main chat area -->
  <main class="chat-main" id="chat-main">
    <header class="chat-header">
      <button class="menu-btn" id="menu-btn" title="Open sidebar">☰</button>
      <div class="chat-header-info">
        <div class="therapist-avatar">AI</div>
        <div>
          <span class="therapist-name">TherapistAI</span>
          <span class="therapist-subtitle">Your private space</span>
        </div>
        <span class="status-dot" id="status-dot"></span>
        <span class="status-text" id="status-text">Connecting…</span>
      </div>
    </header>

    <div class="messages" id="messages"></div>

    <footer class="input-area">
      <textarea
        id="msg-input"
        placeholder="Type here — I'm listening…"
        rows="1"
        maxlength="2000"
        autocomplete="off"
      ></textarea>
      <button id="send-btn" disabled>Send</button>
    </footer>
  </main>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
